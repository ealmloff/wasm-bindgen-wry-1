name: Public API Diff Comment

on:
  workflow_run:
    workflows: ["Rust CI"]
    types: [completed]

permissions:
  actions: read
  pull-requests: write

concurrency:
  group: public-api-diff-comment-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request'
    name: Comment Public API Diff
    runs-on: ubuntu-24.04
    steps:
      - name: Download public API diff artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: public-api-diff-*
          path: ${{ runner.temp }}/public-api-diff-download
          merge-multiple: true

      - name: Validate public API diff artifact
        id: diff
        if: steps.download.outcome == 'success'
        shell: bash
        env:
          ARTIFACT_ROOT: ${{ runner.temp }}/public-api-diff-download
          EXPECTED_REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_REPO_ID: ${{ github.event.workflow_run.head_repository.id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from pathlib import Path

          artifact_root = Path(os.environ["ARTIFACT_ROOT"])
          metadata_files = list(artifact_root.glob("**/metadata.json"))
          if len(metadata_files) != 1:
              print(f"Expected one public API diff metadata file, found {len(metadata_files)}")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                  output.write("should_comment=false\n")
              sys.exit(0)

          metadata_path = metadata_files[0]
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          if metadata.get("schema_version") != 1 or metadata.get("kind") != "wasm-bindgen-public-api-diff":
              print("Artifact metadata schema is not supported", file=sys.stderr)
              sys.exit(1)
          if metadata.get("repository") != os.environ["EXPECTED_REPOSITORY"]:
              print("Artifact repository does not match this repository", file=sys.stderr)
              sys.exit(1)
          if metadata.get("event_name") != "pull_request":
              print("Artifact did not come from a pull_request workflow", file=sys.stderr)
              sys.exit(1)

          comment_file = metadata_path.with_name("comment.md")
          if not comment_file.is_file():
              print(f"Missing public API diff comment file: {comment_file}", file=sys.stderr)
              sys.exit(1)

          workflow_sha = os.environ["WORKFLOW_RUN_SHA"]
          allowed_shas = {metadata.get("head_sha"), metadata.get("merge_sha")}
          if workflow_sha not in allowed_shas:
              print("Artifact SHA does not match the triggering workflow_run", file=sys.stderr)
              sys.exit(1)

          try:
              pr_number = int(metadata.get("pr_number") or 0)
          except (TypeError, ValueError):
              pr_number = 0
          if pr_number <= 0:
              print("Artifact metadata is missing a valid pr_number", file=sys.stderr)
              sys.exit(1)

          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['EXPECTED_REPOSITORY']}/pulls/{pr_number}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "wasm-bindgen-public-api-diff-comment",
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  pull_request = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              print(f"GitHub API lookup for PR #{pr_number} failed: {exc.code} {exc.reason}", file=sys.stderr)
              sys.exit(1)

          head = pull_request.get("head") or {}
          head_repo = head.get("repo") or {}
          if (
              pull_request.get("state") != "open"
              or head.get("sha") != metadata.get("head_sha")
              or head.get("ref") != metadata.get("head_ref")
              or head_repo.get("id") != int(metadata.get("head_repo_id") or 0)
              or str(head_repo.get("id")) != os.environ["WORKFLOW_RUN_HEAD_REPO_ID"]
          ):
              print(f"PR #{pr_number} does not match the triggering workflow_run")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                  output.write("should_comment=false\n")
              sys.exit(0)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("should_comment=true\n")
              output.write(f"pr_number={pr_number}\n")
              output.write(f"comment_file={comment_file}\n")
          PY

      - name: Comment on pull request
        if: steps.diff.outputs.should_comment == 'true'
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3
        with:
          pr-number: ${{ steps.diff.outputs.pr_number }}
          file-path: ${{ steps.diff.outputs.comment_file }}
